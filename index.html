<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A pet supplies catalog website for browsing product categories, names, and images."
    />
    <title>Pet Supplies Product Catalog</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-content">
        <div>
          <p class="eyebrow">Pet Supplies Catalog</p>
          <h1 id="site-title">Pet Supplies Product Catalog</h1>
          <p id="site-description" class="site-description">
            Browse pet supplies by category and view product names with images.
          </p>
        </div>

        <div class="contact-panel" aria-label="Contact links">
          <a
            class="contact-link"
            href="https://www.facebook.com/profile.php?id=61585897942353"
            target="_blank"
            rel="noreferrer"
            aria-label="Facebook profile"
            title="Facebook"
          >
            <span class="contact-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path
                  d="M13.5 21v-7h2.3l.5-3h-2.8V9.3c0-.8.4-1.6 1.8-1.6H16V5.1c-.3 0-.9-.1-1.8-.1-3 0-4.7 1.8-4.7 5V11H7v3h2.5v7h4z"
                  fill="currentColor"
                />
              </svg>
            </span>
          </a>

          <a
            class="contact-link"
            href="https://wa.me/8613728181520"
            target="_blank"
            rel="noreferrer"
            aria-label="WhatsApp contact"
            title="WhatsApp"
          >
            <span class="contact-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path
                  d="M20 11.9A8 8 0 0 1 8.2 18.8L4 20l1.2-4.1A8 8 0 1 1 20 11.9zm-8-6.5a6.5 6.5 0 0 0-5.5 9.9l.3.5-.7 2.4 2.5-.7.4.2A6.5 6.5 0 1 0 12 5.4zm3.9 8.2c-.2-.1-1.2-.6-1.4-.7-.2-.1-.3-.1-.5.1l-.4.5c-.1.1-.3.2-.5.1a5.3 5.3 0 0 1-2.6-2.3c-.1-.2 0-.4.1-.5l.4-.4c.1-.1.1-.2.2-.4 0-.1 0-.3-.1-.4l-.6-1.4c-.1-.3-.3-.3-.5-.3h-.4c-.1 0-.4.1-.6.3-.2.2-.8.8-.8 1.9s.8 2.2.9 2.4c.1.1 1.5 2.3 3.7 3.2.5.2 1 .4 1.3.5.6.2 1.1.2 1.5.1.5-.1 1.2-.5 1.4-1 .2-.5.2-.9.1-1 0-.1-.2-.1-.4-.2z"
                  fill="currentColor"
                />
              </svg>
            </span>
          </a>

          <a
            class="contact-link"
            href="mailto:walker.clar2002@gmail.com"
            aria-label="Email contact"
            title="Email"
          >
            <span class="contact-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path
                  d="M4 6h16a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2zm0 2v.2l8 5.3 8-5.3V8H4zm16 8V10.6l-7.4 4.9a1 1 0 0 1-1.2 0L4 10.6V16h16z"
                  fill="currentColor"
                />
              </svg>
            </span>
          </a>
        </div>
      </div>
    </header>

    <main class="container layout">
      <aside class="sidebar" aria-label="Product categories">
        <div class="sidebar-title">Product Categories</div>
        <nav id="category-list" class="category-list"></nav>
      </aside>

      <section class="content" aria-live="polite">
        <div class="content-heading">
          <div>
            <p id="category-kicker" class="eyebrow">All Products</p>
            <h2 id="category-title">All Categories</h2>
          </div>
          <span id="product-count" class="product-count">0 products</span>
        </div>
        <p id="category-description" class="category-description">
          Select a category to view matching products.
        </p>
        <label class="product-search" for="product-search-input">
          <span class="sr-only">Search products</span>
          <span class="search-icon" aria-hidden="true">⌕</span>
          <input
            id="product-search-input"
            type="search"
            placeholder="Search by product name or item number"
            autocomplete="off"
          />
          <button id="clear-search-button" type="button" aria-label="Clear search" hidden>
            ×
          </button>
        </label>
        <div id="product-grid" class="product-grid"></div>
      </section>
    </main>

    <div
      id="product-detail-modal"
      class="product-detail-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="product-detail-title"
      hidden
    >
      <div id="product-detail-backdrop" class="product-detail-backdrop"></div>
      <section class="product-detail-dialog">
        <button id="product-detail-close" class="product-detail-close" type="button" aria-label="Close product details">×</button>
        <div class="product-detail-gallery">
          <div class="product-detail-main-image-wrap">
            <img id="product-detail-main-image" src="assets/images/placeholder.svg" alt="" />
          </div>
          <div id="product-detail-thumbnails" class="product-detail-thumbnails" aria-label="Product image gallery"></div>
        </div>
        <div class="product-detail-content">
          <p id="product-detail-category" class="product-detail-category"></p>
          <p id="product-detail-code" class="product-detail-code"></p>
          <h2 id="product-detail-title"></h2>
          <div id="product-detail-specifications" class="product-detail-specifications"></div>
          <div id="product-detail-description" class="product-detail-description"></div>
        </div>
      </section>
    </div>

    <footer class="site-footer">
      <div class="container">
        <span id="footer-text">© Pet Supplies Product Catalog</span>
        <span class="footer-separator" aria-hidden="true">·</span>
        <span id="visitor-count" class="visitor-count" style="display: none">
          Total Views: <span id="visitor-count-value">0</span>
        </span>
        <span id="busuanzi_container_site_pv" style="display: none" aria-hidden="true">
          <span id="busuanzi_value_site_pv"></span>
        </span>
      </div>
    </footer>

    <script src="assets/js/catalog.config.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
      (() => {
        const countKey = "pet-catalog-total-views";
        const dateKey = "pet-catalog-last-counted-date";
        const countContainer = document.getElementById("visitor-count");
        const countValue = document.getElementById("visitor-count-value");
        const today = new Date().toLocaleDateString("en-CA");

        const showCount = (value) => {
          countValue.textContent = value;
          countContainer.style.display = "inline";
        };

        const savedCount = localStorage.getItem(countKey);
        if (savedCount) {
          showCount(savedCount);
        }

        if (localStorage.getItem(dateKey) === today) {
          return;
        }

        const script = document.createElement("script");
        script.src = "https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js";
        script.async = true;
        script.addEventListener("load", () => {
          let attempts = 0;
          const readCount = () => {
            const remoteValue = document.getElementById("busuanzi_value_site_pv")?.textContent?.trim();
            if (remoteValue && /^\d+$/.test(remoteValue)) {
              localStorage.setItem(countKey, remoteValue);
              localStorage.setItem(dateKey, today);
              showCount(remoteValue);
              return;
            }

            attempts += 1;
            if (attempts < 20) {
              window.setTimeout(readCount, 250);
            }
          };
          readCount();
        });
        document.head.appendChild(script);
      })();
    </script>
  </body>
</html>
