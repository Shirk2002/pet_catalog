name: Generate catalog thumbnails

on:
  push:
    branches:
      - main
    paths:
      - "assets/images/catalog/*.png"
      - "assets/images/catalog/*.jpg"
      - "assets/images/catalog/*.jpeg"
      - "assets/images/catalog/*.webp"
      - "assets/images/catalog/*.gif"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: catalog-thumbnails
  cancel-in-progress: false

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install image tools
        run: python -m pip install --disable-pip-version-check Pillow

      - name: Generate missing thumbnails
        run: |
          python - <<'PY'
          from pathlib import Path
          from PIL import Image

          source = Path("assets/images/catalog")
          target = source / "thumbnails"
          target.mkdir(exist_ok=True)

          image_paths = [
              path
              for pattern in ("*.png", "*.jpg", "*.jpeg", "*.webp", "*.gif")
              for path in source.glob(pattern)
              if path.parent == source
          ]

          for image_path in image_paths:
              thumbnail_path = target / f"{image_path.stem}.webp"
              if thumbnail_path.exists():
                  continue

              with Image.open(image_path) as image:
                  image.thumbnail((640, 480), Image.Resampling.LANCZOS)
                  if image.mode not in ("RGB", "RGBA"):
                      image = image.convert("RGBA" if "transparency" in image.info else "RGB")
                  image.save(thumbnail_path, "WEBP", quality=78, method=6)
          PY

      - name: Commit generated thumbnails
        run: |
          if git diff --quiet -- assets/images/catalog/thumbnails; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/images/catalog/thumbnails
          git commit -m "Generate catalog thumbnails"
          git push
